name: Branch build

on:
  workflow_dispatch:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
      - uses: ./.github/actions/setup
      - name: Format the entire source tree
        run: nix fmt
      - name: Lint with clj-kondo
        run: nix develop --command clj -M:clj-kondo --lint src test
      - name: Run tests
        run: nix develop --command clj -X:dev:test
  coverage:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
      - uses: ./.github/actions/setup
      - name: Produce coverage report with Cloverage
        run: nix develop --command clj -Mdev:cloverage --text
      - name: Comment coverage summary on PR
        uses: marocchino/sticky-pull-request-comment@v3
        with:
          hide_and_recreate: true
          hide_classify: "OUTDATED"
          path: target/coverage/coverage.txt
          message: |
            ## Test Coverage
            ```
            {{{content}}}
            ```
